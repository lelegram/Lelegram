name: Release APK

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: pwsh
        run: |
          sdkmanager --install `
            "platforms;android-36" `
            "build-tools;36.1.0" `
            "ndk;27.3.13750724" `
            "cmake;4.0.2"

      - name: Restore Windows debug keystore
        shell: pwsh
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          $androidHome = Join-Path $env:USERPROFILE '.android'
          $debugKeystore = Join-Path $androidHome 'debug.keystore'

          if ([string]::IsNullOrWhiteSpace($env:DEBUG_KEYSTORE_BASE64)) {
            throw 'Repository secret DEBUG_KEYSTORE_BASE64 is required.'
          }

          New-Item -ItemType Directory -Force -Path $androidHome | Out-Null
          [IO.File]::WriteAllBytes($debugKeystore, [Convert]::FromBase64String($env:DEBUG_KEYSTORE_BASE64))

          keytool -list `
            -keystore $debugKeystore `
            -storepass android `
            -alias androiddebugkey | Out-Null

      - name: Validate Telegram API secrets
        shell: pwsh
        env:
          LELE_APP_ID: ${{ secrets.LELE_APP_ID }}
          LELE_APP_HASH: ${{ secrets.LELE_APP_HASH }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:LELE_APP_ID)) {
            throw 'Repository secret LELE_APP_ID is required.'
          }
          if ($env:LELE_APP_ID -notmatch '^\d+$') {
            throw 'Repository secret LELE_APP_ID must be an integer.'
          }
          if ([string]::IsNullOrWhiteSpace($env:LELE_APP_HASH)) {
            throw 'Repository secret LELE_APP_HASH is required.'
          }

      - name: Read release metadata
        id: metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $properties = @{}

          Get-Content gradle.properties | ForEach-Object {
            if ($_ -match '^\s*([^#][^=]+?)\s*=\s*(.*)\s*$') {
              $properties[$matches[1]] = $matches[2]
            }
          }

          $versionName = $properties['APP_VERSION_NAME']
          $versionCode = $properties['APP_VERSION_CODE']

          if ([string]::IsNullOrWhiteSpace($versionName) -or [string]::IsNullOrWhiteSpace($versionCode)) {
            throw 'APP_VERSION_NAME and APP_VERSION_CODE are required in gradle.properties.'
          }

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "v$versionName-$versionCode-$shortSha"
          $title = "Lelegram $versionName ($versionCode)"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=$title" >> $env:GITHUB_OUTPUT
          "version_name=$versionName" >> $env:GITHUB_OUTPUT
          "version_code=$versionCode" >> $env:GITHUB_OUTPUT

      - name: Build release APKs
        shell: bash
        env:
          ORG_GRADLE_PROJECT_LELE_APP_ID: ${{ secrets.LELE_APP_ID }}
          ORG_GRADLE_PROJECT_LELE_APP_HASH: ${{ secrets.LELE_APP_HASH }}
        run: ./gradlew --no-daemon :TMessagesProj_App:assembleRelease -PnativeDebugSymbolLevel=SYMBOL_TABLE

      - name: Create and push tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ steps.metadata.outputs.tag }}'
          $sha = '${{ github.sha }}'

          git fetch --force --tags origin
          $existingCommit = git rev-list -n 1 $tag 2>$null

          if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($existingCommit)) {
            if ($existingCommit -ne $sha) {
              throw "Tag $tag already exists on $existingCommit, expected $sha."
            }
            Write-Host "Tag $tag already exists on this commit."
            exit 0
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a $tag $sha -m "Release $tag"
          git push origin $tag

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ steps.metadata.outputs.tag }}'
          $title = '${{ steps.metadata.outputs.title }}'
          $assets = Get-ChildItem 'TMessagesProj_App/build/outputs/apk/release' -Filter '*.apk' -File

          if ($assets.Count -eq 0) {
            throw 'No release APKs were produced.'
          }

          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          $notes = @"
          Automated release from the release branch.

          Commit: ${{ github.sha }}
          Version: ${{ steps.metadata.outputs.version_name }}
          Version code: ${{ steps.metadata.outputs.version_code }}
          Signing: Repository secret DEBUG_KEYSTORE_BASE64
          Telegram API config: Repository secrets LELE_APP_ID and LELE_APP_HASH via Gradle project properties
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assetPaths --clobber
          } else {
            gh release create $tag $assetPaths --target '${{ github.sha }}' --title $title --notes $notes --latest
          }
